services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uiaudit
      POSTGRES_PASSWORD: uiaudit
      POSTGRES_DB: uiaudit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uiaudit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uiaudit -d uiaudit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - uiaudit
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://uiaudit:uiaudit@postgres:5432/uiaudit
      REDIS_URL: redis://redis:6379
    volumes:
      - screenshots:/app/public/screenshots
    networks:
      - uiaudit
    healthcheck:
      # node:22-slim ships neither wget nor curl, so probe via node's http
      # module. Treat any 2xx/3xx/4xx as "the server is up" — we care about
      # process liveness here, not application-level success.
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Worker runs the same image as the web app but with a different command.
  # Scales independently; restart without touching the web tier. Shares the
  # screenshots volume so captures written here are served by the web app.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/worker.cjs"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://uiaudit:uiaudit@postgres:5432/uiaudit
      REDIS_URL: redis://redis:6379
    volumes:
      - screenshots:/app/public/screenshots
    networks:
      - uiaudit
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  screenshots:

networks:
  uiaudit:
    driver: bridge
